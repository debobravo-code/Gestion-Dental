services:
  eureka-server:
    build: ./Eureka.Server/Eureka.Server
    image: eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"

  gateway-service:
    build: ./gateway-service/gateway-service
    image: gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  insumo-service:
    build: ./insumo-service
    image: insumo-service
    container_name: insumo-service
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/insumo_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""

  proveedor-service:
    build: ./proveedor-service
    image: proveedor-service
    container_name: proveedor-service
    ports:
      - "8082:8082"
