server:
  port: ${PORT:8080}

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: insumo-service
              uri: lb://INSUMO-SERVICE
              predicates:
                - Path=/api/insumos,/api/insumos/**

            - id: stock-service
              uri: lb://STOCK-SERVICE
              predicates:
                - Path=/api/stock,/api/stock/**

            - id: ingreso-service
              uri: lb://INGRESO-SERVICE
              predicates:
                - Path=/api/ingresos,/api/ingresos/**

            - id: egreso-service
              uri: lb://EGRESO-SERVICE
              predicates:
                - Path=/api/egresos,/api/egresos/**

            - id: egreso-service-v2
              uri: lb://EGRESO-SERVICE
              predicates:
                - Path=/api/v2/egresos,/api/v2/egresos/**

            - id: proveedor-service
              uri: lb://PROVEEDOR-SERVICE
              predicates:
                - Path=/api/proveedores,/api/proveedores/**

            - id: destino-service
              uri: lb://DESTINO-SERVICE
              predicates:
                - Path=/api/destinos,/api/destinos/**

            - id: usuario-service
              uri: lb://USUARIO-SERVICE
              predicates:
                - Path=/api/usuarios,/api/usuarios/**

            - id: alerta-service
              uri: lb://ALERTA-SERVICE
              predicates:
                - Path=/api/alertas,/api/alertas/**

            - id: reporte-service
              uri: lb://REPORTE-SERVICE
              predicates:
                - Path=/api/reportes,/api/reportes/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

  instance:
    prefer-ip-address: true